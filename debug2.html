<!DOCTYPE html>
<html><head><title>JS Debug v2</title></head>
<body style="font-family:monospace;padding:2rem;background:#111;color:#0f0;">
<h2>Script Loading Diagnostic v2</h2>
<div id="log"></div>
<script>
function log(msg, ok) {
  var d = document.getElementById('log');
  d.innerHTML += '<div style="color:' + (ok ? '#0f0' : '#f00') + ';margin:4px 0;">' + msg + '</div>';
}

window.onerror = function(msg, src, line, col, err) {
  log('GLOBAL ERROR: ' + msg, false);
  log('  Source: ' + src, false);
  log('  Line: ' + line + ', Col: ' + col, false);
  if (err && err.stack) log('  Stack: ' + err.stack.substring(0, 500), false);
  return true;
};
</script>

<script>
log('Step 1: Loading stocks-data.js...', true);
</script>
<script src="js/stocks-data.js?v=3" onerror="log('NETWORK ERROR: stocks-data.js failed to load (404 or network)', false)"></script>
<script>
if (typeof STOCKS_DATA !== 'undefined') {
  log('OK: STOCKS_DATA loaded, ' + STOCKS_DATA.length + ' stocks, first ticker: ' + (STOCKS_DATA[0] ? STOCKS_DATA[0].ticker : 'none'), true);
} else {
  log('FAIL: STOCKS_DATA is undefined — syntax error in stocks-data.js', false);
}
</script>

<script>
log('Step 2: Loading mines-data.js...', true);
</script>
<script src="js/mines-data.js?v=3" onerror="log('NETWORK ERROR: mines-data.js failed to load (404 or network)', false)"></script>
<script>
if (typeof MINES_DATA !== 'undefined') {
  var keys = Object.keys(MINES_DATA);
  log('OK: MINES_DATA loaded, ' + keys.length + ' tickers: ' + keys.join(', '), true);
} else {
  log('FAIL: MINES_DATA is undefined — syntax error in mines-data.js', false);
  log('Attempting eval diagnosis...', true);
}
</script>

<script>
if (typeof MINES_DATA === 'undefined') {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'js/mines-data.js?v=3&t=' + Date.now(), false);
  xhr.send();
  if (xhr.status === 200) {
    log('File fetched OK (' + xhr.responseText.length + ' bytes). Trying eval...', true);
    try {
      eval(xhr.responseText);
      if (typeof MINES_DATA !== 'undefined') {
        log('eval SUCCEEDED! MINES_DATA now has ' + Object.keys(MINES_DATA).length + ' keys. Maybe encoding issue with script tag.', true);
      } else {
        log('eval ran without error but MINES_DATA still undefined!', false);
      }
    } catch(e) {
      log('EVAL ERROR: ' + e.message, false);
      log('Error name: ' + e.name, false);
      if (e.lineNumber) log('Approx line: ' + e.lineNumber, false);

      // Binary search for the error
      var lines = xhr.responseText.split('\n');
      log('Total lines in file: ' + lines.length, true);
      
      // Try first half
      var half = Math.floor(lines.length / 2);
      
      // Try progressively smaller chunks from the start
      for (var chunk = 100; chunk <= lines.length; chunk += 100) {
        var partial = lines.slice(0, chunk).join('\n');
        // Close any open objects
        if (partial.indexOf('var MINES_DATA') >= 0) {
          var testCode = partial + '\n};';
          try {
            eval(testCode);
          } catch(e2) {
            log('Error appears around line ' + (chunk - 100) + '-' + chunk + ': ' + e2.message, false);
            // Now narrow down
            for (var narrow = chunk - 100; narrow <= chunk; narrow++) {
              var narrowPartial = lines.slice(0, narrow).join('\n') + '\n};';
              try {
                eval(narrowPartial);
              } catch(e3) {
                continue;
              }
              // If we get here, line narrow-1 to narrow is where the problem starts
              if (narrow > chunk - 100 + 1) {
                log('EXACT: Error between line ' + (narrow) + ' and ' + (narrow + 1), false);
                log('Line ' + narrow + ': ' + lines[narrow - 1].substring(0, 150), false);
                log('Line ' + (narrow + 1) + ': ' + lines[narrow].substring(0, 150), false);
                log('Line ' + (narrow + 2) + ': ' + (lines[narrow + 1] || '').substring(0, 150), false);
                break;
              }
            }
            break;
          }
        }
      }
    }
  } else {
    log('XHR failed: status ' + xhr.status, false);
  }
}
</script>

<script>
log('Step 3: Loading mines-data-patch.js...', true);
</script>
<script src="js/mines-data-patch.js?v=3" onerror="log('NETWORK ERROR: mines-data-patch.js failed to load', false)"></script>
<script>log('mines-data-patch.js execution completed', true);</script>

<script>
log('Step 4: Loading mine-analysis.js...', true);
</script>
<script src="js/mine-analysis.js?v=3" onerror="log('NETWORK ERROR: mine-analysis.js failed to load', false)"></script>
<script>log('mine-analysis.js execution completed', true);</script>

<script>log('=== DONE ===', true);</script>
</body></html>
