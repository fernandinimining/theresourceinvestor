<!DOCTYPE html>
<html><head><title>JS Debug</title></head>
<body style="font-family:monospace;padding:2rem;background:#111;color:#0f0;">
<h2>Script Loading Diagnostic</h2>
<div id="log"></div>
<script>
function log(msg, ok) {
  var d = document.getElementById('log');
  d.innerHTML += '<div style="color:' + (ok ? '#0f0' : '#f00') + ';">' + msg + '</div>';
}
</script>
<script>window._t1 = Date.now();</script>
<script src="js/stocks-data.js?v=2" onerror="log('FAIL: stocks-data.js did not load', false)"></script>
<script>
if (typeof STOCKS_DATA !== 'undefined') log('OK: STOCKS_DATA loaded — ' + STOCKS_DATA.length + ' stocks', true);
else log('FAIL: STOCKS_DATA is undefined after loading stocks-data.js', false);
</script>
<script src="js/mines-data.js?v=2" onerror="log('FAIL: mines-data.js did not load', false)"></script>
<script>
if (typeof MINES_DATA !== 'undefined') {
  var keys = Object.keys(MINES_DATA);
  log('OK: MINES_DATA loaded — ' + keys.length + ' tickers: ' + keys.join(', '), true);
} else {
  log('FAIL: MINES_DATA is undefined after loading mines-data.js', false);
}
</script>
<script src="js/mines-data-patch.js?v=2" onerror="log('FAIL: mines-data-patch.js did not load', false)"></script>
<script>log('OK: mines-data-patch.js executed', true);</script>
<script src="js/mine-analysis.js?v=2" onerror="log('FAIL: mine-analysis.js did not load', false)"></script>
<script>
log('OK: mine-analysis.js executed', true);
log('Time: ' + (Date.now() - window._t1) + 'ms', true);
var sel = document.getElementById('mine-company-select');
log('Selector element: ' + (sel ? 'found' : 'NOT FOUND'), !!sel);

// Try manual load
if (typeof MINES_DATA !== 'undefined' && typeof STOCKS_DATA !== 'undefined') {
  log('Attempting manual FCX load...', true);
  var fcx = MINES_DATA['FCX'];
  log('FCX mines: ' + (fcx ? fcx.length + ' entries' : 'MISSING'), !!fcx);
  if (fcx && fcx[0]) log('First mine: ' + fcx[0].name + ' — ' + fcx[0].country, true);
  
  var bvn = MINES_DATA['BVN'];
  log('BVN mines: ' + (bvn ? bvn.length + ' entries' : 'MISSING'), !!bvn);
  if (bvn && bvn[0]) log('First BVN mine: ' + bvn[0].name + ' — ' + bvn[0].country, true);
}
</script>
</body></html>
